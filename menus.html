<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Menús — Grupo Colmena</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5efe3;color:#2a1f0e;min-height:100vh}
.app{display:grid;grid-template-columns:1fr 360px;min-height:100vh}
@media(max-width:800px){.app{grid-template-columns:1fr}}
.left{background:#faf7f0;border-right:1px solid #d9d2c3;padding:20px;overflow-y:auto;max-height:100vh}
.right{background:#e8e0d4;padding:20px;overflow-y:auto;max-height:100vh;display:flex;flex-direction:column;align-items:center;gap:16px}
.steps{display:flex;gap:2px;margin-bottom:20px}
.step{flex:1;padding:10px;text-align:center;font-size:.78rem;font-weight:600;border-bottom:3px solid #d9d2c3;color:#7a6f5e;cursor:pointer;transition:all .2s}
.step.active{border-color:#6b7c5c;color:#4a5a3d}
.step.done{border-color:#c9a84c;color:#c9a84c}
.screen{display:none}.screen.active{display:block}
.card{background:#fff;border:1px solid #d9d2c3;border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#4a5a3d;margin-bottom:12px}
label{font-size:.7rem;font-weight:600;color:#7a6f5e;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
input,select,textarea{background:#f5efe3;border:1px solid #d9d2c3;color:#2a1f0e;padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.88rem;width:100%;outline:none}
input:focus,select:focus{border-color:#6b7c5c}
.row{display:flex;gap:8px;margin-bottom:10px}
.row>*{flex:1}
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;transition:all .15s}
.btn-g{background:#6b7c5c;color:#fff}.btn-g:hover{background:#4a5a3d}
.btn-gold{background:#c9a84c;color:#fff}
.btn-gh{background:transparent;border:1px solid #d9d2c3;color:#7a6f5e}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-full{width:100%;margin-top:8px}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;padding:2px 6px;font-size:.85rem}
.del-btn:hover{color:#8b3a1a}
.sec-toggle{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border:1px solid #d9d2c3;border-radius:10px;margin-bottom:6px;cursor:pointer}
.sec-toggle input[type=checkbox]{width:18px;height:18px;accent-color:#6b7c5c;cursor:pointer;flex-shrink:0}
.sec-body{display:none;background:#f5efe3;border:1px solid #d9d2c3;border-radius:0 0 10px 10px;padding:10px;margin-top:-6px;margin-bottom:8px}
.sec-body.open{display:block}
.menu-card{width:100%;max-width:320px;background:#6b7c5c;border-radius:4px;padding:28px 24px 70px;color:#fff;position:relative;font-family:'Cormorant Garamond',serif;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.prev-bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:#4a5a3d}
.prev-line{position:absolute;left:4px;right:12px;height:.5px;background:rgba(255,255,255,.25)}
.prev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;margin-top:6px}
.prev-title{font-size:1.6rem;font-weight:400;line-height:1.15;max-width:170px}
.prev-logo{width:55px;height:73px;object-fit:contain}
.prev-sec{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-decoration:underline;color:rgba(255,255,255,.85);margin:14px 0 6px}
.prev-plato{font-size:.95rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.prev-plato::before{content:'-';margin-right:4px}
.prev-desc{font-size:.78rem;font-style:italic;color:rgba(255,255,255,.65);margin:0 0 8px 10px}
.prev-divider{height:.5px;background:rgba(255,255,255,.2);margin:10px 0}
.prev-footer{position:absolute;bottom:18px;left:24px;right:12px;display:flex;justify-content:space-between;align-items:flex-end}
.prev-bebida{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:underline;color:rgba(255,255,255,.8)}
.prev-precio{font-size:1.6rem;font-weight:700}
.calc-box{background:#4a5a3d;color:#fff;border-radius:10px;padding:14px;margin-bottom:10px}
.calc-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:.82rem}
.calc-val{color:#c9a84c;font-weight:600}
.precio-sug{background:#fff;border:2px solid #6b7c5c;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.precio-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:#4a5a3d}
.desc-picker{background:#f5efe3;border:1px solid #d9d2c3;border-radius:8px;padding:8px;margin-top:6px}
.desc-opt{padding:7px 10px;cursor:pointer;font-size:.85rem;font-style:italic;color:#7a6f5e;border-radius:6px;border:1px solid transparent;margin-bottom:3px}
.desc-opt:hover{background:#fff;border-color:#6b7c5c}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#2a1f0e;color:#fff;padding:9px 18px;border-radius:50px;font-size:.85rem;opacity:0;transition:all .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;font-family:'DM Sans',sans-serif}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:#4a5a3d;margin-bottom:16px}
.empty{color:#7a6f5e;font-size:.85rem;text-align:center;padding:16px}
</style>
</head>
<body>
<div class="app">
<div class="left">
  <div class="steps">
    <div class="step active" id="stp1" onclick="ir(1)">1 · Platos</div>
    <div class="step" id="stp2" onclick="ir(2)">2 · Menú</div>
    <div class="step" id="stp3" onclick="ir(3)">3 · Precio</div>
  </div>
  <div id="scr1" class="screen active">
    <div class="card">
      <div class="card-title">➕ Nuevo plato</div>
      <div class="row">
        <div><label>Nombre</label><input id="pn" placeholder="Ej: Solomillo ibérico"></div>
        <div style="flex:.6"><label>Categoría</label><input id="pc" placeholder="Entrante..."></div>
      </div>
      <div style="margin-bottom:10px">
        <label>Descripción</label>
        <div style="display:flex;gap:6px">
          <input id="pd" placeholder="a la brasa, con guarnición..." style="flex:1">
          <button class="btn btn-gh btn-sm" onclick="genIA()" title="IA">✨</button>
        </div>
        <div id="desc-pick" style="display:none" class="desc-picker"></div>
      </div>
      <div class="row">
        <div><label>Coste total (€)</label><input id="pk" type="number" placeholder="0.00" step="0.5" min="0"></div>
        <div style="display:flex;align-items:flex-end"><button class="btn btn-g btn-full" onclick="addPlato()">Guardar plato</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📚 Catálogo</div>
      <div id="lista-platos"><div class="empty">Sin platos guardados</div></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-gold btn-full" style="flex:2" onclick="ir(2)">Crear menú →</button>
      <button class="btn btn-gh btn-sm" onclick="verGuardados()">📂</button>
    </div>
  </div>
  <div id="scr2" class="screen">
    <div class="card">
      <div class="card-title">📋 Datos del menú</div>
      <div class="row">
        <div><label>Nombre del menú</label><input id="mn" placeholder="Menú Mayoría de Edad" oninput="preview()"></div>
        <div style="flex:.7"><label>Local</label>
          <select id="ml" onchange="preview()">
            <option value="casino">Casino l'Agricultura</option>
            <option value="bonita">Bonita Beach Club</option>
            <option value="teular">El Teular</option>
            <option value="teras">Teras</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div><label>Bebida</label>
          <select id="mb" onchange="toggleCustom();preview()">
            <option value="si">✅ Con bebida incluida</option>
            <option value="no">❌ Sin bebida</option>
            <option value="custom">✏️ Personalizada</option>
          </select>
        </div>
        <div id="custom-wrap" style="display:none">
          <label>Texto bebida</label>
          <input id="mb2" placeholder="Ej: Vino y cava" oninput="preview()">
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:.9rem;margin-top:4px">
        <input type="checkbox" id="mcafe" style="width:18px;height:18px;accent-color:#6b7c5c" onchange="preview()">
        ☕ Café incluido (+1.5€/persona)
      </label>
    </div>
    <div class="card">
      <div class="card-title">🍽️ Secciones</div>
      <p style="font-size:.8rem;color:#7a6f5e;margin-bottom:12px">Activa las secciones y añade platos.</p>
      <div id="secs-container"></div>
      <div class="row" style="margin-top:8px">
        <input id="nueva-sec" placeholder="Nueva sección personalizada...">
        <button class="btn btn-gh btn-sm" onclick="addSec()" style="flex:0">+</button>
      </div>
    </div>
    <button class="btn btn-gold btn-full" onclick="finalizar()">✅ Listo → Calcular precio</button>
  </div>
  <div id="scr3" class="screen">
    <div class="card">
      <div class="card-title">👥 Datos del evento</div>
      <div class="row">
        <div><label>Comensales</label><input id="cc" type="number" placeholder="50" min="1" oninput="calcular()"></div>
        <div><label>Tarifa camarero (€/h)</label><input id="ct" type="number" value="14" step="0.5" oninput="calcular()"></div>
      </div>
      <div class="row">
        <div><label>Margen (%)</label><input id="cm" type="number" value="30" min="0" max="100" oninput="calcular()"></div>
        <div><label>Platos detectados</label><div id="platos-info" style="padding:9px 12px;background:#f5efe3;border:1px solid #d9d2c3;border-radius:8px;font-size:.85rem;color:#6b7c5c;font-weight:600">—</div></div>
      </div>
    </div>
    <div id="precio-box" style="display:none" class="precio-sug">
      <div>
        <div style="font-size:.7rem;color:#7a6f5e;text-transform:uppercase;letter-spacing:1px">Precio sugerido</div>
        <div class="precio-num"><span id="precio-sug-num">—</span>€<span style="font-size:.8rem;color:#7a6f5e">/p</span></div>
        <div style="font-size:.72rem;color:#7a6f5e">Coste: <span id="coste-pp">—</span>€ · Margen: <span id="margen-real">—</span>%</div>
      </div>
      <div><label>Precio final</label><input id="cp" type="number" step="0.5" style="width:90px;text-align:center;font-weight:700" oninput="preview()"></div>
    </div>
    <div id="calc-detalle"></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-g" style="flex:1" onclick="pdfMenu()">📄 PDF Menú</button>
      <button class="btn btn-gh" style="flex:1" onclick="pdfServicio()">📋 Hoja servicio</button>
    </div>
  </div>
</div>
<div class="right">
  <div style="font-size:.7rem;color:#888;letter-spacing:2px;text-transform:uppercase">Vista previa</div>
  <div class="menu-card" id="menu-preview">
    <div class="prev-bar"></div>
    <div class="prev-line" style="top:16px"></div>
    <div class="prev-line" style="bottom:56px"></div>
    <div class="prev-header">
      <div class="prev-title" id="prev-tit">Menú<br>del Evento</div>

let sb=null;
let platos=JSON.parse(localStorage.getItem('gc_platos3')||'[]');
let secciones=[{id:1,nombre:'Entrantes',activa:false,items:[]},{id:2,nombre:'Plato principal',activa:false,items:[]},{id:3,nombre:'Postre',activa:false,items:[]}];
let secsExtra=[];
let calcD={};

document.addEventListener('DOMContentLoaded',()=>{
  try{sb=supabase.createClient(SB_URL,SB_KEY);cargarPlatos();}
  catch(e){console.error(e);renderPlatos();renderSecs();}
});

function ir(n){
  [1,2,3].forEach(i=>{
    document.getElementById('scr'+i).classList.toggle('active',i===n);
    const s=document.getElementById('stp'+i);
    s.className='step'+(i===n?' active':i<n?' done':'');
  });
  if(n===2)renderSecs();
  if(n===3)calcular();
}

function addPlato(){
  const n=document.getElementById('pn').value.trim();
  const c=document.getElementById('pc').value.trim()||'General';
  const d=document.getElementById('pd').value.trim();
  const k=parseFloat(document.getElementById('pk').value)||0;
  if(!n){toast('Escribe el nombre');return;}
  const p={id:Date.now(),nombre:n,cat:c,desc:d,coste:k};
  platos.push(p);
  localStorage.setItem('gc_platos3',JSON.stringify(platos));
  ['pn','pc','pd','pk'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('desc-pick').style.display='none';
  renderPlatos();
  toast('Plato guardado ✓');
  if(sb)sb.from('platos_menu').insert({nombre:n,cat:c,desc:d,coste:k}).select().then(({data,error})=>{
    if(!error&&data&&data[0]){p.id=data[0].id;localStorage.setItem('gc_platos3',JSON.stringify(platos));}
  }).catch(console.error);
}

async function cargarPlatos(){
  try{
    const {data,error}=await sb.from('platos_menu').select('*').order('cat').order('nombre');
    if(!error&&data&&data.length){
      platos=data.map(p=>({id:p.id,nombre:p.nombre,cat:p.cat||'General',desc:p.desc||'',coste:p.coste||0}));
      localStorage.setItem('gc_platos3',JSON.stringify(platos));
    }
  }catch(e){console.error(e);}
  renderPlatos();renderSecs();
}

function deletePlato(id){
  platos=platos.filter(p=>p.id!==id);
  localStorage.setItem('gc_platos3',JSON.stringify(platos));
  renderPlatos();
  if(sb)sb.from('platos_menu').delete().eq('id',id).catch(console.error);
}

function renderPlatos(){
  const el=document.getElementById('lista-platos');
  if(!platos.length){el.innerHTML='<div class="empty">Sin platos guardados</div>';return;}
  const cats=[...new Set(platos.map(p=>p.cat))];
  el.innerHTML=cats.map(cat=>`
    <div style="margin-bottom:10px">
      <div style="font-size:.68rem;font-weight:700;color:#6b7c5c;text-transform:uppercase;letter-spacing:1px;padding:5px 0 3px;border-bottom:1px solid #d9d2c3">${cat}</div>
      ${platos.filter(p=>p.cat===cat).map(p=>`
      <div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f5efe3">
        <div style="flex:1">
          <div style="font-size:.88rem;font-weight:500">${p.nombre} ${p.coste?`<span style="color:#c9a84c;font-size:.75rem">${p.coste}€</span>`:''}</div>
          ${p.desc?`<div style="font-size:.75rem;font-style:italic;color:#7a6f5e">${p.desc}</div>`:''}
        </div>
        <button class="del-btn" onclick="genIAplato(${p.id})" title="IA">✨</button>
        <button class="del-btn" onclick="deletePlato(${p.id})">✕</button>
      </div>
      <div id="pick-${p.id}" style="display:none" class="desc-picker"></div>`).join('')}
    </div>`).join('');
}

function addSec(){
  const n=document.getElementById('nueva-sec').value.trim();
  if(!n)return;
  secsExtra.push({id:Date.now(),nombre:n,activa:true,items:[]});
  document.getElementById('nueva-sec').value='';
  renderSecs();
}

function todasSecs(){return [...secciones,...secsExtra];}

function toggleSec(id){
  const s=todasSecs().find(s=>s.id===id);
  if(s){s.activa=!s.activa;renderSecs();preview();}
}

function addItemSec(id){
  const s=todasSecs().find(s=>s.id===id);
  const sel=document.getElementById('sel-'+id);
  if(!s||!sel||!sel.value)return;
  const pid=parseInt(sel.value);
  const p=platos.find(p=>p.id===pid);
  if(p&&!s.items.find(i=>i.id===pid)){s.items.push({...p});renderSecs();preview();}
  sel.value='';
}

function addItemLibre(id){
  const s=todasSecs().find(s=>s.id===id);
  const n=document.getElementById('lib-n-'+id)?.value.trim();
  const d=document.getElementById('lib-d-'+id)?.value.trim();
  if(!s||!n){toast('Escribe el nombre');return;}
  s.items.push({id:Date.now(),nombre:n,desc:d||'',coste:0,cat:'libre'});
  document.getElementById('lib-n-'+id).value='';
  document.getElementById('lib-d-'+id).value='';
  renderSecs();preview();
}

function removeItem(secId,itemId){
  const s=todasSecs().find(s=>s.id===secId);
  if(s){s.items=s.items.filter(i=>i.id!==itemId);renderSecs();preview();}
}

function renderSecs(){
  const el=document.getElementById('secs-container');
  el.innerHTML=todasSecs().map(s=>`
    <div>
      <div class="sec-toggle" onclick="toggleSec(${s.id})">
        <input type="checkbox" ${s.activa?'checked':''} onclick="event.stopPropagation();toggleSec(${s.id})">
        <span style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:#4a5a3d;flex:1">${s.nombre}</span>
        <span style="font-size:.72rem;color:#7a6f5e">${s.items.length} platos</span>
      </div>
      <div class="sec-body ${s.activa?'open':''}">

async function cargarMenu(id){
  if(!sb)return;
  const {data}=await sb.from('menus_guardados').select('*').eq('id',id).single();
  if(!data)return;
  document.getElementById('mn').value=data.nombre||'';
  document.getElementById('ml').value=data.local||'casino';
  document.getElementById('mb').value=data.bebida||'no';
  if(data.bebida_txt)document.getElementById('mb2').value=data.bebida_txt;
  document.getElementById('mcafe').checked=data.tiene_cafe||false;
  toggleCustom();
  try{
    const secsData=JSON.parse(data.secciones||'[]');
    secciones=[{id:1,nombre:'Entrantes',activa:false,items:[]},{id:2,nombre:'Plato principal',activa:false,items:[]},{id:3,nombre:'Postre',activa:false,items:[]}];
    secsExtra=[];
    secsData.forEach(s=>{
      const ex=secciones.find(sec=>sec.nombre===s.nombre);
      if(ex){ex.activa=true;ex.items=s.items||[];}
      else secsExtra.push({...s,activa:true});
    });
  }catch(e){}
  document.getElementById('modal-guardados')?.remove();
  ir(2);renderSecs();preview();toast('Menú cargado ✓');
}

function calcular(){
  const com=parseInt(document.getElementById('cc')?.value)||0;
  const tar=parseFloat(document.getElementById('ct')?.value)||14;
  const mar=parseFloat(document.getElementById('cm')?.value)||30;
  const bev=document.getElementById('mb')?.value||'no';
  const cafe=document.getElementById('mcafe')?.checked||false;
  if(!com){document.getElementById('precio-box').style.display='none';return;}
  const act=todasSecs().filter(s=>s.activa);
  let numPlatos=0,costEnt=0,costRest=0;
  act.forEach(s=>{
    numPlatos+=s.items.length;
    const esEnt=s.nombre.toLowerCase().includes('entrant')||s.nombre.toLowerCase().includes('aperit');
    s.items.forEach(p=>{if(p.coste){if(esEnt)costEnt+=p.coste/4;else costRest+=p.coste/com;}});
  });
  const infoEl=document.getElementById('platos-info');
  if(infoEl)infoEl.textContent=numPlatos>0?numPlatos+' platos ('+act.map(s=>s.nombre).join(', ')+')':'Sin platos';
  const minServ=Math.round(numPlatos>0?numPlatos*25:150);
  const horas=Math.round(minServ/60*10)/10;
  const cam=Math.ceil(com/25),coc=Math.ceil(com/50);
  const costBeb=bev==='si'?Math.round(3.5*horas*10)/10:0;
  const costCafe=cafe?1.5:0;
  const costPers=(cam*horas*tar+coc*horas*12)/com;
  const costPP=costEnt+costRest+costBeb+costCafe+costPers;
  const sug=Math.ceil(costPP/(1-mar/100)*2)/2;
  calcD={com,tar,horas,minServ,cam,coc,costBeb,costCafe,costPers:costPers*com,costPP,sug,bev,cafe};
  document.getElementById('precio-box').style.display='flex';
  document.getElementById('precio-sug-num').textContent=sug.toFixed(2);
  document.getElementById('coste-pp').textContent=costPP.toFixed(2);
  const cpEl=document.getElementById('cp');
  if(!cpEl.value){cpEl.value=sug.toFixed(2);cpEl.style.borderColor='#6b7c5c';}
  const pf=parseFloat(cpEl.value)||sug;
  const ing=pf*com,ben=ing-costPP*com;
  const marReal=Math.round(ben/ing*100);
  document.getElementById('margen-real').textContent=marReal;
  const bvino=bev==='si'?Math.ceil(com*0.4/0.75):0;
  const bagua=bev==='si'?Math.ceil(com*0.3/1.5):0;
  const bref=bev==='si'?Math.ceil(com*0.5):0;
  document.getElementById('calc-detalle').innerHTML=`
    <div class="calc-box">
      <div style="font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:#c9a84c;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">Desglose</div>
      <div class="calc-row"><span>👥 Comensales</span><span class="calc-val">${com}p</span></div>
      <div class="calc-row"><span>🍽️ Camareros</span><span class="calc-val">${cam} × ${horas}h × ${tar}€</span></div>
      <div class="calc-row"><span>👨‍🍳 Cocineros</span><span class="calc-val">${coc} × ${horas}h × 12€</span></div>
      <div class="calc-row"><span>⏱ Duración</span><span class="calc-val">${horas}h (${minServ}min)</span></div>
      ${bev==='si'?`<div class="calc-row"><span>🍹 Bebida</span><span class="calc-val">${costBeb.toFixed(2)}€/p · ${bvino}btl vino / ${bagua}btl agua / ${bref} refr</span></div>`:''}
      ${cafe?`<div class="calc-row"><span>☕ Café</span><span class="calc-val">1.50€/p</span></div>`:''}
      <div class="calc-row"><span>💰 Facturación</span><span class="calc-val">${ing.toFixed(2)}€</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2)">
        <span style="font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700">Beneficio</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:#c9a84c">${ben.toFixed(2)}€</span>
      </div>
    </div>`;
  preview();
}

function getPDFData(){

  const locNom={casino:"Casino l'Agricultura",bonita:"Bonita Beach Club",teular:"El Teular Restaurant",teras:"Teras"}[loc]||loc;
  const bev=document.getElementById('mb')?.value||'no';

    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:'Genera 3 descripciones gastronómicas elegantes (máx 8 palabras, minúsculas) para "'+n+'". Solo JSON: {"d":["d1","d2","d3"]}'}]})});
    const data=await r.json();
    const parsed=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    const pick=document.getElementById('desc-pick');
    pick.style.display='block';
    pick.innerHTML=parsed.d.map(d=>`<div class="desc-opt" onclick="selDesc('${d.replace(/'/g,"\\'")}','pd','desc-pick')">"${d}"</div>`).join('');
  }catch(e){toast('Error IA');}
  finally{btn.textContent='✨';btn.disabled=false;}
}

async function genIAplato(id){
  const p=platos.find(p=>p.id===id);if(!p)return;
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:'Genera 3 descripciones gastronómicas cortas (máx 7 palabras, minúsculas) para "'+p.nombre+'". Solo JSON: {"d":["d1","d2","d3"]}'}]})});
    const data=await r.json();
    const parsed=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    const pick=document.getElementById('pick-'+id);
    if(pick){pick.style.display='block';pick.innerHTML=parsed.d.map(d=>`<div class="desc-opt" onclick="aplicarDesc(${id},'${d.replace(/'/g,"\\'")}',this.parentNode)">"${d}"</div>`).join('');}
  }catch(e){toast('Error IA');}
  finally{btn.textContent='✨';btn.disabled=false;}
}

function selDesc(desc,inputId,pickId){
  document.getElementById(inputId).value=desc;
  document.getElementById(pickId).style.display='none';
  toast('✓');
}

function aplicarDesc(id,desc,picker){
  const p=platos.find(p=>p.id===id);
  if(p){p.desc=desc;localStorage.setItem('gc_platos3',JSON.stringify(platos));renderPlatos();toast('✓');}
  if(picker)picker.style.display='none';
}

async function genIAlibre(secId){
  const nom=document.getElementById('lib-n-'+secId)?.value.trim();
  if(!nom){toast('Escribe el nombre');return;}
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:'Genera 3 descripciones gastronómicas (máx 7 palabras, minúsculas) para "'+nom+'". Solo JSON: {"d":["d1","d2","d3"]}'}]})});
    const data=await r.json();
    const parsed=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    let pick=document.getElementById('lib-pick-'+secId);
    if(!pick){pick=document.createElement('div');pick.id='lib-pick-'+secId;pick.className='desc-picker';pick.style.marginTop='4px';document.getElementById('lib-d-'+secId).parentNode.after(pick);}
    pick.style.display='block';
    pick.innerHTML=parsed.d.map(d=>`<div class="desc-opt" onclick="document.getElementById('lib-d-${secId}').value='${d.replace(/'/g,"\\'")}';this.parentNode.style.display='none';toast('✓')">"${d}"</div>`).join('');
  }catch(e){toast('Error IA');}
  finally{btn.textContent='✨';btn.disabled=false;}
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
