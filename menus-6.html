<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menús — Grupo Colmena</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --olive:#6b7c5c; --olive-dark:#4a5a3d; --cream:#f5f0e6; --paper:#faf7f0;
  --ink:#2a2318; --ink2:#7a6f5e; --gold:#c9a84c; --border:#d9d2c3; --red:#8b3a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}
.app{display:grid;grid-template-columns:1fr 420px;min-height:100vh;}
@media(max-width:900px){.app{grid-template-columns:1fr;}}
.panel{padding:24px;overflow-y:auto;max-height:100vh;}
.panel-left{background:var(--paper);border-right:1px solid var(--border);}
.panel-right{background:#e8e0d4;display:flex;flex-direction:column;align-items:center;gap:16px;}

/* STEPS */
.steps{display:flex;gap:2px;margin-bottom:20px;}
.step{flex:1;padding:10px 6px;text-align:center;font-size:0.78rem;font-weight:600;border-bottom:3px solid var(--border);color:var(--ink2);cursor:pointer;transition:all 0.2s;}
.step.active{border-bottom-color:var(--olive);color:var(--olive-dark);}
.step.done{border-bottom-color:var(--gold);color:var(--gold);}
.screen{display:none;} .screen.active{display:block;}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--olive-dark);margin-bottom:12px;letter-spacing:0.5px;}

/* INPUTS */
input,select,textarea{background:var(--cream);border:1px solid var(--border);color:var(--ink);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;width:100%;outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--olive);}
label{font-size:0.7rem;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
.row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end;}
.row>*{flex:1;}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.88rem;transition:all 0.15s;white-space:nowrap;}
.btn-olive{background:var(--olive);color:#fff;} .btn-olive:hover{background:var(--olive-dark);}
.btn-gold{background:var(--gold);color:#fff;} .btn-gold:hover{background:#b8943a;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--ink2);}
.btn-ghost:hover{border-color:var(--olive);color:var(--olive);}
.btn-full{width:100%;margin-top:8px;}
.btn-sm{padding:5px 10px;font-size:0.78rem;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;padding:3px 6px;border-radius:4px;font-size:0.85rem;flex-shrink:0;}
.del-btn:hover{color:var(--red);}

/* SECCION TOGGLE */
.sec-toggle{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;}
.sec-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--olive);cursor:pointer;flex-shrink:0;}
.sec-toggle-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--olive-dark);letter-spacing:0.5px;flex:1;}
.sec-body{display:none;padding:10px 12px;background:var(--cream);border:1px solid var(--border);border-radius:0 0 10px 10px;margin-top:-8px;margin-bottom:8px;}
.sec-body.open{display:block;}

/* PLATO ITEM */
.plato-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.plato-item:last-child{border-bottom:none;}
.plato-nombre-small{flex:1;font-size:0.88rem;}
.plato-desc-small{font-size:0.75rem;color:var(--ink2);font-style:italic;}

/* DESC PICKER */
.desc-picker{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;}
.desc-option{padding:8px 10px;cursor:pointer;font-size:0.85rem;font-style:italic;color:var(--ink2);border-radius:6px;border:1px solid transparent;margin-bottom:4px;transition:all 0.15s;}
.desc-option:hover{background:#fff;border-color:var(--olive);}

/* CALC */
.calc-result{background:var(--olive-dark);color:#fff;border-radius:12px;padding:18px;margin-bottom:12px;}
.calc-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--gold);margin-bottom:12px;letter-spacing:1px;text-transform:uppercase;}
.calc-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.85rem;}
.calc-row:last-child{border-bottom:none;}
.calc-val{font-weight:600;color:var(--gold);}
.precio-sugerido{background:#fff;border:2px solid var(--olive);border-radius:10px;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.precio-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--olive-dark);}

/* PREVIEW MENU */
.menu-card{background:var(--olive);width:100%;max-width:340px;min-height:500px;border-radius:4px;padding:32px 28px 80px;color:#fff;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
.prev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;}
.prev-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;line-height:1.2;max-width:180px;}
.prev-logo{width:70px;height:70px;object-fit:contain;filter:brightness(0) invert(1) opacity(0.85);}
.prev-divider{height:1px;background:rgba(255,255,255,0.3);margin:14px 0;}
.prev-sec-name{font-family:'Cormorant Garamond',serif;font-size:0.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;text-decoration:underline;margin:16px 0 8px;}
.prev-plato{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.prev-plato::before{content:'-';margin-right:4px;}
.prev-desc{font-family:'Cormorant Garamond',serif;font-size:0.82rem;font-style:italic;color:rgba(255,255,255,0.72);margin-bottom:8px;margin-left:12px;}
.prev-footer{position:absolute;bottom:24px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:flex-end;}
.prev-bebida{font-family:'Cormorant Garamond',serif;font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-decoration:underline;}
.prev-precio{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:50px;font-size:0.85rem;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{color:var(--ink2);font-size:0.85rem;text-align:center;padding:16px;}
.badge-ia{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3);font-size:0.7rem;padding:2px 7px;border-radius:50px;font-weight:600;}
</style>
</head>
<body>
<div class="app">
<div class="panel panel-left">

  <!-- STEPS -->
  <div class="steps">
    <div class="step active" id="step-1" onclick="goStep(1)">1 · Platos</div>
    <div class="step" id="step-2" onclick="goStep(2)">2 · Menú</div>
    <div class="step" id="step-3" onclick="goStep(3)">3 · Precio</div>
  </div>

  <!-- STEP 1: PLATOS -->
  <div id="screen-1" class="screen active">
    <div class="card">
      <div class="card-title">➕ Nuevo plato</div>
      <div class="row">
        <div><label>Nombre</label><input id="p-nombre" placeholder="Solomillo ibérico"></div>
        <div style="flex:0.6"><label>Categoría</label><input id="p-cat" placeholder="Entrante..."></div>
      </div>
      <div style="margin-bottom:10px">
        <label>Descripción</label>
        <div style="display:flex;gap:6px">
          <input id="p-desc" placeholder="a la brasa, con guarnición de temporada" style="flex:1">
          <button class="btn btn-ghost btn-sm" onclick="genDesc()" title="Generar con IA">✨</button>
        </div>
        <div id="desc-picker" style="display:none;margin-top:6px" class="desc-picker"></div>
      </div>
      <div class="row">
        <div><label>Coste total del plato (€)</label><input id="p-coste" type="number" placeholder="0.00" step="0.5" min="0"></div>
        <div style="flex:0.5;display:flex;align-items:flex-end">
          <button class="btn btn-olive btn-full" onclick="addPlato()">Guardar</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📚 Catálogo</div>
      <div id="lista-platos"><div class="empty">Sin platos</div></div>
    </div>
    <button class="btn btn-gold btn-full" onclick="goStep(2)">Continuar → Crear menú</button>
  </div>

  <!-- STEP 2: MENU -->
  <div id="screen-2" class="screen">
    <div class="card">
      <div class="card-title">📋 Datos del menú</div>
      <div class="row">
        <div><label>Nombre del menú</label><input id="m-nombre" placeholder="Menú Mayoría de Edad" oninput="updatePreview()"></div>
        <div style="flex:0.7"><label>Local</label>
          <select id="m-local" onchange="updatePreview()">
            <option value="casino">Casino l'Agricultura</option>
            <option value="bonita">Bonita Beach Club</option>
            <option value="teular">El Teular</option>
            <option value="teras">Teras</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Bebida</label>
          <select id="m-bebida" onchange="toggleBebidaCustom();updatePreview()">
            <option value="si">✅ Con bebida incluida</option>
            <option value="no">❌ Sin bebida</option>
            <option value="custom">✏️ Personalizada</option>
          </select>
        </div>
        <div id="bebida-custom-wrap" style="display:none">
          <label>Texto bebida</label>
          <input id="m-bebida-txt" placeholder="Ej: Vino y cava" oninput="updatePreview()">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0">
        <input type="checkbox" id="m-cafe" style="width:18px;height:18px;accent-color:var(--olive)" onchange="updatePreview()">
        <label style="margin:0;text-transform:none;letter-spacing:0;font-size:0.9rem;cursor:pointer" for="m-cafe">☕ Incluye café (+1.5€/persona)</label>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🍽️ Secciones</div>
      <p style="font-size:0.8rem;color:var(--ink2);margin-bottom:12px">Activa las que uses y añade los platos de tu catálogo.</p>
      <div id="secciones-container"></div>
      <div class="row" style="margin-top:8px">
        <input id="nueva-sec" placeholder="Nueva sección personalizada...">
        <button class="btn btn-ghost btn-sm" onclick="addSeccionCustom()" style="flex:0">+</button>
      </div>
    </div>

    <button class="btn btn-gold btn-full" onclick="finalizarMenu()">✅ Menú listo → Calcular precio</button>
  </div>

  <!-- STEP 3: PRECIO -->
  <div id="screen-3" class="screen">
    <div class="card">
      <div class="card-title">👥 Datos del evento</div>
      <div class="row">
        <div><label>Comensales</label><input id="c-com" type="number" placeholder="50" min="1" oninput="calcular()"></div>
        <div><label>Tarifa camarero (€/h)</label><input id="c-tarifa" type="number" value="14" step="0.5" min="0" oninput="calcular()"></div>
      </div>
      <div class="row">
        <div><label>Margen beneficio (%)</label><input id="c-margen" type="number" value="30" min="0" max="100" oninput="calcular()"></div>
        <div style="display:flex;flex-direction:column;justify-content:flex-end">
          <div style="font-size:0.72rem;color:var(--ink2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Platos detectados</div>
          <div id="c-platos-info" style="font-size:0.85rem;color:var(--olive);font-weight:600;padding:9px 12px;background:var(--cream);border-radius:8px;border:1px solid var(--border)">—</div>
        </div>
      </div>
    </div>

    <div id="precio-sugerido-box" style="display:none" class="precio-sugerido">
      <div>
        <div style="font-size:0.72rem;color:var(--ink2);text-transform:uppercase;letter-spacing:1px">Precio sugerido</div>
        <div class="precio-num"><span id="precio-num">—</span>€<span style="font-size:0.8rem;color:var(--ink2)">/persona</span></div>
        <div style="font-size:0.75rem;color:var(--ink2);margin-top:2px">Coste real: <span id="coste-real">—</span>€/p · Margen: <span id="margen-real">—</span>%</div>
      </div>
      <div>
        <label>Precio final</label>
        <input id="c-precio-final" type="number" step="0.5" min="0" style="width:90px;text-align:center;font-weight:700;font-size:1rem" oninput="recalcularConPrecio()">
      </div>
    </div>

    <div id="calc-detalle"></div>

    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-olive" style="flex:1" onclick="generarPDFMenu()">📄 PDF Menú</button>
      <button class="btn btn-ghost" style="flex:1" onclick="generarPDFServicio()">📋 Hoja servicio</button>
    </div>
  </div>

</div>

<!-- RIGHT: PREVIEW -->
<div class="panel panel-right">
  <div style="font-size:0.7rem;color:#888;letter-spacing:2px;text-transform:uppercase">Vista previa</div>
  <div class="menu-card" id="menu-preview">
    <div class="prev-header">

// STATE
let platos = JSON.parse(localStorage.getItem('gc_platos2') || '[]');
let calcData = {};

// Secciones predefinidas
const SECCIONES_DEFAULT = ['Entrantes', 'Plato principal', 'Postre'];
let secciones = SECCIONES_DEFAULT.map(n => ({ id: Date.now() + Math.random(), nombre: n, activa: false, platos: [] }));
let seccionesCustom = [];

function save() { localStorage.setItem('gc_platos2', JSON.stringify(platos)); }

// ============================================================
// STEPS
// ============================================================
function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('screen-'+i).classList.toggle('active', i===n);
    const s = document.getElementById('step-'+i);
    s.classList.remove('active','done');
    if (i===n) s.classList.add('active');
    else if (i<n) s.classList.add('done');
  });
  if (n===2) renderSecciones();
  if (n===3) calcular();
}

function finalizarMenu() {
  const nombre = document.getElementById('m-nombre').value.trim();
  if (!nombre) { toast('Escribe el nombre del menú'); return; }
  const todasSecs = [...secciones, ...seccionesCustom];
  const activas = todasSecs.filter(s => s.activa);
  if (!activas.length) { toast('Activa al menos una sección'); return; }
  goStep(3);
  updatePreview();
}

// ============================================================
// PLATOS
// ============================================================
function addPlato() {
  const nombre = document.getElementById('p-nombre').value.trim();
  const cat = document.getElementById('p-cat').value.trim() || 'General';
  const desc = document.getElementById('p-desc').value.trim();
  const coste = parseFloat(document.getElementById('p-coste').value) || 0;
  if (!nombre) { toast('Escribe el nombre'); return; }
  platos.push({ id: Date.now(), nombre, cat, desc, coste });
  save();
  ['p-nombre','p-cat','p-desc','p-coste'].forEach(id => document.getElementById(id).value='');
  document.getElementById('desc-picker').style.display = 'none';
  renderPlatos();
  toast('Plato guardado ✓');
}

function deletePlato(id) {
  platos = platos.filter(p => p.id !== id);
  save(); renderPlatos();
}

function renderPlatos() {
  const lista = document.getElementById('lista-platos');
  if (!platos.length) { lista.innerHTML = '<div class="empty">Sin platos todavía</div>'; return; }
  const cats = [...new Set(platos.map(p => p.cat))];
  lista.innerHTML = cats.map(cat => `
    <div style="margin-bottom:10px">
      <div style="font-size:0.68rem;font-weight:700;color:var(--olive);text-transform:uppercase;letter-spacing:1px;padding:6px 0 4px;border-bottom:1px solid var(--border)">${cat}</div>
      ${platos.filter(p=>p.cat===cat).map(p=>`
      <div class="plato-item">
        <div style="flex:1">
          <div class="plato-nombre-small">${p.nombre} ${p.coste?'<span style="color:var(--gold);font-size:0.75rem">'+p.coste+'€</span>':''}</div>
          ${p.desc?`<div class="plato-desc-small">${p.desc}</div>`:''}
        </div>
        <button class="del-btn" onclick="genDescExistente(${p.id})" title="IA">✨</button>
        <button class="del-btn" onclick="deletePlato(${p.id})">✕</button>
      </div>
      <div id="picker-${p.id}" style="display:none" class="desc-picker"></div>`).join('')}
    </div>`).join('');
}

// ============================================================
// SECCIONES
// ============================================================
function renderSecciones() {
  const cont = document.getElementById('secciones-container');
  const todasSecs = [...secciones, ...seccionesCustom];
  cont.innerHTML = todasSecs.map(s => `
    <div>
      <div class="sec-toggle" onclick="toggleSeccion(${s.id})">
        <input type="checkbox" ${s.activa?'checked':''} onclick="event.stopPropagation();toggleSeccion(${s.id})">
        <span class="sec-toggle-name">${s.nombre}</span>
        <span style="font-size:0.75rem;color:var(--ink2)">${s.platos.length} platos</span>
      </div>
      <div class="sec-body ${s.activa?'open':''}">
        ${s.platos.map(p=>`
          <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
            <span style="flex:1;font-size:0.85rem">- ${p.nombre}${p.desc?' <em style="color:var(--ink2);font-size:0.78rem">'+p.desc+'</em>':''}</span>
            <button class="del-btn" onclick="removePlatoSec(${s.id},${p.id})">✕</button>
          </div>`).join('')}
        <div style="display:flex;gap:6px;margin-top:8px">
          <select id="sel-${s.id}" style="flex:1;font-size:0.82rem">
            <option value="">Añadir plato del catálogo...</option>
            ${platos.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('')}
          </select>
          <button class="btn btn-olive btn-sm" onclick="addPlatoSec(${s.id})">+</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <input id="libre-nom-${s.id}" placeholder="O escribe un plato libre..." style="flex:2;font-size:0.82rem">
          <input id="libre-desc-${s.id}" placeholder="Descripción..." style="flex:2;font-size:0.82rem">
          <button class="btn btn-ghost btn-sm" onclick="addPlatoLibre(${s.id})">+</button>
          <button class="btn btn-ghost btn-sm" onclick="genDescLibre(${s.id})" title="IA">✨</button>
        </div>
      </div>
    </div>`).join('');
  updatePreview();
}

function toggleSeccion(id) {
  const sec = [...secciones,...seccionesCustom].find(s=>s.id===id);
  if (sec) { sec.activa = !sec.activa; renderSecciones(); }
}

function addPlatoSec(secId) {
  const sec = [...secciones,...seccionesCustom].find(s=>s.id===secId);
  const sel = document.getElementById('sel-'+secId);
  const platId = parseInt(sel.value);
  if (!sec||!platId) return;
  const plato = platos.find(p=>p.id===platId);
  if (plato && !sec.platos.find(p=>p.id===platId)) {
    sec.platos.push({...plato});
    renderSecciones(); updatePreview();
  }
  sel.value='';
}

function addPlatoLibre(secId) {
  const sec = [...secciones,...seccionesCustom].find(s=>s.id===secId);
  const nom = document.getElementById('libre-nom-'+secId)?.value.trim();
  const desc = document.getElementById('libre-desc-'+secId)?.value.trim();
  if (!sec||!nom) { toast('Escribe el nombre del plato'); return; }
  sec.platos.push({ id: Date.now(), nombre: nom, desc: desc||'', coste:0, cat:'libre' });
  renderSecciones(); updatePreview();
}

function removePlatoSec(secId, platId) {
  const sec = [...secciones,...seccionesCustom].find(s=>s.id===secId);
  if (sec) { sec.platos = sec.platos.filter(p=>p.id!==platId); renderSecciones(); updatePreview(); }
}

function addSeccionCustom() {
  const nom = document.getElementById('nueva-sec').value.trim();
  if (!nom) return;
  seccionesCustom.push({ id: Date.now(), nombre: nom, activa: true, platos: [] });
  document.getElementById('nueva-sec').value='';
  renderSecciones();
}

// ============================================================
// BEBIDA TOGGLE
// ============================================================
function toggleBebidaCustom() {
  const val = document.getElementById('m-bebida').value;
  const wrap = document.getElementById('bebida-custom-wrap');
  if (wrap) wrap.style.display = val==='custom' ? 'block' : 'none';
}

// ============================================================
// PREVIEW
// ============================================================
function updatePreview() {
  const nombre = document.getElementById('m-nombre')?.value || 'Menú del Evento';
  const bebidaSel = document.getElementById('m-bebida')?.value || 'si';
  const bebidaTxt = document.getElementById('m-bebida-txt')?.value || '';
  const tieneCafe = document.getElementById('m-cafe')?.checked;
  const precioFinal = document.getElementById('c-precio-final')?.value;

  // Title
  const words = nombre.split(' ');
  const mid = Math.ceil(words.length/2);

// CALCULAR
// ============================================================
function calcular() {
  const comensales = parseInt(document.getElementById('c-com')?.value) || 0;
  const tarifa = parseFloat(document.getElementById('c-tarifa')?.value) || 14;
  const margen = parseFloat(document.getElementById('c-margen')?.value) || 30;
  const bebidaSel = document.getElementById('m-bebida')?.value || 'no';
  const bebidaCustomPrecio = parseFloat(document.getElementById('m-bebida-precio')?.value) || 0;
  const tieneCafe = document.getElementById('m-cafe')?.checked || false;

  if (!comensales) { document.getElementById('calc-detalle').innerHTML=''; document.getElementById('precio-sugerido-box').style.display='none'; return; }

  // Platos
  const todasSecs = [...secciones,...seccionesCustom].filter(s=>s.activa);
  let numPlatos = 0;
  let costeEntrantesTotal = 0;
  let costeRestanteTotal = 0;
  todasSecs.forEach(s => {
    numPlatos += s.platos.length;
    const esEntrante = s.nombre.toLowerCase().includes('entrant') || s.nombre.toLowerCase().includes('aperit') || s.nombre.toLowerCase().includes('tapa');
    s.platos.forEach(p => {
      if (p.coste) {
        if (esEntrante) costeEntrantesTotal += p.coste / 4;
        else costeRestanteTotal += p.coste / comensales;
      }
    });
  });

  // Info platos
  const platosInfo = document.getElementById('c-platos-info');
  if (platosInfo) platosInfo.textContent = numPlatos > 0 ? numPlatos+' platos ('+todasSecs.map(s=>s.nombre).join(', ')+')' : 'Sin platos';

  // Tiempos
  const minBase = 150, platosBase = 6;
  const minServicio = Math.round(numPlatos>0 ? numPlatos*(minBase/platosBase) : minBase);
  const horas = Math.round(minServicio/60*10)/10;

  // Personal
  const camareros = Math.ceil(comensales/25);
  const cocineros = Math.ceil(comensales/50);
  const costeCam = camareros * horas * tarifa;
  const costeCoc = cocineros * horas * 12;
  const costePersonalPp = (costeCam + costeCoc) / comensales;

  // Bebida: 3.5€/h × horas
  const costeBebidaPp = bebidaSel==='si' ? Math.round(3.5*horas*10)/10 : bebidaSel==='custom' ? bebidaCustomPrecio : 0;

  // Café
  const costeCafePp = tieneCafe ? 1.5 : 0;

  // Total
  const costePlatosPp = costeEntrantesTotal + costeRestanteTotal;
  const costeTotalPp = costePlatosPp + costePersonalPp + costeBebidaPp + costeCafePp;

  // Precio sugerido
  const precioSug = Math.ceil(costeTotalPp / (1-margen/100) * 2) / 2;

  // Set precio final if empty
  const pfInput = document.getElementById('c-precio-final');
  if (!pfInput.value) {
    pfInput.value = precioSug.toFixed(2);
    pfInput.style.borderColor = 'var(--olive)';
  }
  const precioFinal = parseFloat(pfInput.value) || precioSug;

  const ingresos = precioFinal * comensales;
  const costeTotal = costeTotalPp * comensales;
  const beneficio = ingresos - costeTotal;
  const margenReal = ingresos>0 ? Math.round(beneficio/ingresos*100) : 0;

  // Bebida estimada
  const botellaVino = bebidaSel==='si' ? Math.ceil(comensales*0.4/0.75) : 0;
  const botellaAgua = bebidaSel==='si' ? Math.ceil(comensales*0.3/1.5) : 0;
  const refrescos = bebidaSel==='si' ? Math.ceil(comensales*0.5) : 0;
  const cervezas = bebidaSel==='si' ? Math.ceil(comensales*0.5) : 0;

  calcData = { comensales, tarifa, horas, minServicio, camareros, cocineros, costeCam, costeCoc, costeBebidaPp, costeCafePp, costePlatosPp, costeTotalPp, precioSug, precioFinal, ingresos, beneficio, margenReal, botellaVino, botellaAgua, refrescos, cervezas, bebidaSel, tieneCafe };

  // Update UI
  document.getElementById('precio-sugerido-box').style.display = 'flex';
  document.getElementById('precio-num').textContent = precioSug.toFixed(2);
  document.getElementById('coste-real').textContent = costeTotalPp.toFixed(2);
  document.getElementById('margen-real').textContent = margenReal;

  document.getElementById('calc-detalle').innerHTML = `
    <div class="calc-result">
      <div class="calc-title">📊 Desglose</div>
      <div class="calc-row"><span>👥 Comensales</span><span class="calc-val">${comensales}p</span></div>
      <div class="calc-row"><span>🍽️ Camareros (1/25p)</span><span class="calc-val">${camareros} × ${horas}h × ${tarifa}€</span></div>
      <div class="calc-row"><span>👨‍🍳 Cocineros (1/50p)</span><span class="calc-val">${cocineros} × ${horas}h × 12€</span></div>
      <div class="calc-row"><span>⏱️ Duración estimada</span><span class="calc-val">${horas}h (${minServicio}min)</span></div>
      ${bebidaSel==='si'?`
      <div class="calc-row"><span>🍹 Bebida (3.5€/h×${horas}h)</span><span class="calc-val">${costeBebidaPp.toFixed(2)}€/p</span></div>
      <div class="calc-row"><span>🍷 Vino</span><span class="calc-val">${botellaVino} btl</span></div>
      <div class="calc-row"><span>🍺 Cerveza / 🥤 Refresco</span><span class="calc-val">${cervezas} / ${refrescos} uds</span></div>
      <div class="calc-row"><span>💧 Agua (1.5L)</span><span class="calc-val">${botellaAgua} btl</span></div>`:''}
      ${tieneCafe?`<div class="calc-row"><span>☕ Café</span><span class="calc-val">1.50€/p</span></div>`:''}
      <div class="calc-row"><span>💶 Coste personal total</span><span class="calc-val">${(costeCam+costeCoc).toFixed(2)}€</span></div>
      <div class="calc-row"><span>💰 Facturación</span><span class="calc-val">${ingresos.toFixed(2)}€</span></div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.2)">
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700">Beneficio estimado</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold)">${beneficio.toFixed(2)}€</span>
      </div>
    </div>`;

  updatePreview();
}

function recalcularConPrecio() {
  const pf = parseFloat(document.getElementById('c-precio-final').value) || 0;
  if (calcData.comensales && pf) {
    calcData.precioFinal = pf;
    calcData.ingresos = pf * calcData.comensales;
    calcData.beneficio = calcData.ingresos - calcData.costeTotalPp * calcData.comensales;
    calcData.margenReal = Math.round(calcData.beneficio/calcData.ingresos*100);
    document.getElementById('margen-real').textContent = calcData.margenReal;
  }
  updatePreview();
}

    if (!picker) { picker=document.createElement('div'); picker.id='libre-picker-'+secId; picker.className='desc-picker'; picker.style.marginTop='4px'; descInput.parentNode.after(picker); }
    picker.style.display='block';
    picker.innerHTML = descs.map(d=>`<div class="desc-option" onclick="document.getElementById('libre-desc-${secId}').value='${d.replace(/'/g,"\'")}';this.parentNode.style.display='none';toast('✓')">"${d}"</div>`).join('');
  } catch(e){toast('Error IA');}
  finally{btn.textContent='✨';btn.disabled=false;}
}

// ============================================================
// TOAST & INIT
// ============================================================
function toast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Init
renderPlatos();
renderSecciones();
</script>
